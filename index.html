<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאגר ה0רטים והמשחקים הכשרים</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap');
        
        :root { 
            --bg-base: #09090b;
            --bg-surface: #18181b;
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --secondary: #3b82f6;
            --accent: #ec4899;
        }
        
        body { 
            font-family: 'Rubik', sans-serif; 
            background-color: var(--bg-base); 
            color: #f4f4f5;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.1) 0, transparent 50%);
            background-attachment: fixed;
        }
        
        /* עיצוב זכוכית מעודן (Premium Glassmorphism) */
        .glass-panel {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            background: rgba(0, 0, 0, 0.5);
        }

        /* כרטיסיות (Tiles) בעיצוב נקי */
        .tile-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, rgba(39,39,42,0.6) 0%, rgba(24,24,27,0.8) 100%);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .tile-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .tile-card:hover { 
            transform: translateY(-6px); 
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 15px 35px -5px rgba(0,0,0,0.5), 0 0 20px rgba(139, 92, 246, 0.2);
        }
        .tile-card:hover::after { opacity: 1; }

        .tile-icon-wrapper {
            transition: transform 0.4s ease;
        }
        .tile-card:hover .tile-icon-wrapper {
            transform: scale(1.1) translateY(-5px);
        }

        /* כפתור מועדפים על הקלף */
        .favorite-btn {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            z-index: 10;
            padding: 0.5rem;
            border-radius: 9999px;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
            opacity: 0;
        }
        
        .tile-card:hover .favorite-btn, .favorite-btn.is-active {
            opacity: 1;
        }

        .favorite-btn:hover {
            background-color: rgba(0, 0, 0, 0.6);
            transform: scale(1.1);
        }

        .favorite-btn.is-active i {
            fill: #ec4899;
            color: #ec4899;
        }

        /* אנימציות לחיצה על כפתור מועדפים */
        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.35); box-shadow: 0 0 15px rgba(236, 72, 153, 0.6); }
            100% { transform: scale(1); }
        }
        .animate-heart-pop {
            animation: heartPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes heartRemove {
            0% { transform: scale(1); }
            50% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }
        .animate-heart-remove {
            animation: heartRemove 0.3s ease-out;
        }

        /* סקרולר מותאם ואלגנטי */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* אנימציות כניסה */
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.6s ease-out forwards; }
        
        /* עיצוב להודעות מערכת */
        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        /* אפקטים נוספים */
        .gradient-text {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, #a855f7, #ec4899);
        }
    </style>
</head>
<body class="antialiased selection:bg-purple-500/30">

    <!-- מסך התחברות (סיסמה) -->
    <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md transition-all duration-700">
        <div class="glass-panel p-10 md:p-14 rounded-[2rem] text-center max-w-md w-full mx-4 animate-fade-up">

            <div class="relative mb-8">

            </div>
            
            <button onclick="checkPassword()" class="w-full bg-white text-black hover:bg-zinc-200 font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(255,255,255,0.1)] transform transition hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2">

    <!-- מודל הודעות קודמות -->
    <div id="messagesModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 backdrop-blur-md transition-all duration-300">
        <div class="glass-panel w-full max-w-2xl mx-4 max-h-[85vh] flex flex-col rounded-[2rem] border-white/10 shadow-2xl animate-fade-up">
            <div class="flex items-center justify-between p-6 border-b border-white/5">
                <div class="flex items-center gap-3 text-purple-400">
                    <i data-lucide="history" class="w-6 h-6"></i>

    <!-- תוכן האתר (מוסתר בהתחלה) -->
    <div id="mainContent" class="hidden flex-col min-h-screen">
        
        <header class="glass-panel sticky top-0 z-40 border-b border-white/5">
            <div class="container mx-auto px-4 py-4 md:py-5 flex flex-col md:flex-row justify-between items-center gap-5">
                <div class="flex items-center gap-4 text-center md:text-right">
                    <div class="bg-gradient-to-br from-purple-500/20 to-pink-500/20 p-3 rounded-2xl border border-purple-500/20 text-purple-400 shadow-lg">
                        <i data-lucide="library-big" class="w-8 h-8 md:w-10 md:h-10"></i>
                    </div>
                    <div>
                        <h1 class="text-xl md:text-2xl font-bold tracking-tight text-white">מאגר ה0רטים והמשחקים</h1>
                        <div class="flex flex-wrap gap-2 items-center justify-center md:justify-start mt-1.5">
                            <span class="text-xs text-zinc-400 flex items-center gap-1 hidden sm:flex ml-2">
                                <i data-lucide="check-circle-2" class="w-3 h-3 text-emerald-400"></i>
                                חינם לחלוטין
                            </span>
                            <button onclick="showNewFiles()" class="text-xs bg-purple-500/10 hover:bg-purple-500/20 border border-purple-500/30 px-3 py-1.5 rounded-full transition text-purple-300 font-medium flex items-center gap-1.5">
                                <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
                                קבצים חדשים
                            </button>
                            <button onclick="showFavorites()" class="text-xs bg-pink-500/10 hover:bg-pink-500/20 border border-pink-500/30 px-3 py-1.5 rounded-full transition text-pink-300 font-medium flex items-center gap-1.5">
                                <i data-lucide="heart" class="w-3.5 h-3.5"></i>

                <div class="relative w-full md:w-[28rem]">
                    <div class="absolute inset-y-0 right-0 flex items-center pr-4 text-zinc-400 pointer-events-none">
                        <i data-lucide="search" class="w-5 h-5"></i>
                    </div>
                    <input type="text" id="searchInput" placeholder="חיפוש 0רט או משחק..." 
                           class="w-full pl-4 pr-12 py-3.5 rounded-2xl glass-input text-white placeholder-zinc-500 shadow-inner">
                </div>
            </div>
        </header>

        <main class="container mx-auto px-4 py-8 flex-grow">
            
            <!-- אזור הודעות מהנהלת האתר (נטען מגוגל שיטס) -->

                        <i data-lucide="info" class="w-4 h-4"></i>
                        הנתונים נשמרים בדפדפן הנוכחי בלבד, ויימחקו במידה ותנקה היסטוריה או עוגיות (Cookies).
                    </div>
                </div>
                <button onclick="clearSearch()" class="inline-flex items-center gap-2 px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-full text-sm transition text-zinc-300">
                    <i data-lucide="x" class="w-4 h-4"></i> חזור לתיקיות
                </button>
            </div>

            <!-- הגריד של הקבצים -->
            <div id="explorerGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-5">

            </div>

            <!-- סמן גלילה למטה לטעינה עצלה (Infinite Scroll) -->

        <footer class="mt-auto border-t border-white/5 bg-black/40 text-center py-6 text-sm text-zinc-500 flex flex-col items-center justify-center gap-2">
            <div class="flex items-center gap-1.5">
                <span>נבנה באהבה</span>
                <i data-lucide="heart" class="w-4 h-4 text-red-500 fill-red-500"></i>
                <span>| על ידי <a href="https://lev-good.github.io/Good-heart/" target="_blank" class="hover:text-white transition-colors underline decoration-zinc-700 underline-offset-4">לב טוב</a></span>
            </div>
        </footer>

    <script>
        // ==========================================
        // 1. אתחול אייקונים התחלתי
        lucide.createIcons();

        // 2. כתובת ה-API לאימות סיסמה (הדבק כאן את ה-URL שקיבלת מגוגל)
        const AUTH_API_URL = "https://script.google.com/macros/s/AKfycbyqpXEUuiPXyeorCUpzTUb7zi8phFfc938CAG4-OiSgeFCjRGklXG16cbwVVEz0dA-JYQ/exec"; 
        
        // 3. חיבור לקובץ ה-JSON שמיוצר על ידי הסקריפט ונשמר בגיטהאב
        const DATA_JSON_URL = 'https://raw.githubusercontent.com/lev-good/Login-with-password/main/data.json';
        
        // 4. חיבור להודעות גוגל שיטס (הומר ל-CSV)
        const MESSAGES_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSgUqLHEGqyAlO0fcbSFuuXnWn5F-3WoUBkV31yFqWlH6iWXAd_rbUY0fq3-PbMoUcxidwjtM19-1AB/pub?gid=321355246&single=true&output=csv';
        // ==========================================

        let fileSystem = { name: "ראשי", type: "folder", children: {} };
        let currentPathArr = []; 
        let allSearchableItems = []; 
        let isSearchMode = false;
        let isFavoritesMode = false;
        let allSystemMessages = []; 
        
        // ניהול מועדפים
        let favorites = JSON.parse(localStorage.getItem('my_favorites')) || [];
        
        const BATCH_SIZE = 50; 
        let currentDisplayItems = []; 
        let currentlyDisplayedCount = 0;
        let intersectionObserver = null;

        // מערכת התחברות מאובטחת דרך שרת חיצוני
        async function checkPassword() {
            const input = document.getElementById('passInput').value;
            const btn = document.querySelector('button[onclick="checkPassword()"]');
            const err = document.getElementById('errorMsg');
            
            if (!input) return;

            // שינוי תצוגת הכפתור למצב טעינה
            const originalBtnContent = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-circle" class="w-5 h-5 animate-spin"></i><span>מאמת נתונים...</span>`;
            btn.disabled = true;
            err.classList.add('hidden');
            lucide.createIcons({ root: btn });

            try {
                // שליחת הבקשה ל-API של גוגל שיצרנו
                const response = await fetch(`${AUTH_API_URL}?password=${encodeURIComponent(input)}`);
                const result = await response.json();

                if (result.success) {
                    // התחברות הצליחה
                    const loginScreen = document.getElementById('loginScreen');
                    loginScreen.classList.add('opacity-0');
                    loginScreen.classList.add('scale-105');
                    
                    setTimeout(() => {
                        loginScreen.classList.add('hidden');
                        const mainContent = document.getElementById('mainContent');
                        mainContent.classList.remove('hidden');
                        mainContent.classList.add('flex');
                        mainContent.classList.add('animate-fade-up');
                        
                        fetchAnnouncements();
                        fetchExplorerData();
                    }, 600);
                } else {
                    // סיסמה שגויה
                    btn.innerHTML = originalBtnContent;
                    btn.disabled = false;
                    lucide.createIcons({ root: btn });
                    
                    err.classList.remove('hidden');
                    err.classList.add('animate-pulse');
                    setTimeout(() => err.classList.remove('animate-pulse'), 1000);
                }
            } catch (error) {
                // שגיאת תקשורת
                console.error("שגיאה באימות:", error);
                btn.innerHTML = originalBtnContent;
                btn.disabled = false;
                lucide.createIcons({ root: btn });
                
                err.innerHTML = `<i data-lucide="triangle-alert" class="w-4 h-4"></i> שגיאת תקשורת, נסה שוב.`;
                err.classList.remove('hidden');
                lucide.createIcons({ root: err });
            }
        }

        // ==========================================
        // מערכת מועדפים (LocalStorage)
        // ==========================================
        
        function toggleFavorite(event, searchIndex, element) {
            event.preventDefault(); // מניעת פתיחת הקישור/התיקייה בלחיצה על הכפתור
            event.stopPropagation();
            
            const btn = element.closest('.favorite-btn');
            const isFav = favorites.includes(searchIndex);
            
            // איפוס אנימציות קודמות כדי שאפשר יהיה להפעיל אותן מחדש בכל לחיצה
            btn.classList.remove('animate-heart-pop', 'animate-heart-remove');
            void btn.offsetWidth; // מאלץ את הדפדפן לרענן את האלמנט (Reflow)
            
            if (isFav) {
                favorites = favorites.filter(id => id !== searchIndex);
                btn.classList.remove('is-active');
                btn.classList.add('animate-heart-remove'); // הוספת אנימציית הסרה
                
                // אם אנחנו במסך מועדפים וביטלנו מועדף, נסיר אותו מהתצוגה מיד עם אנימציה
                if(isFavoritesMode) {
                    const card = element.closest('.tile-card');
                    card.style.transition = 'all 0.3s ease';
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.9)'; // כיווץ קל ביציאה
                    setTimeout(() => {
                        card.style.display = 'none';
                        updateFavoritesCount();
                    }, 300);
                }
            } else {
                favorites.push(searchIndex);
                btn.classList.add('is-active');
                btn.classList.add('animate-heart-pop'); // הוספת אנימציית בחירה קופצת
            }
            
            localStorage.setItem('my_favorites', JSON.stringify(favorites));
        }

        function updateFavoritesCount() {
            if(isFavoritesMode) {
                const visibleCards = document.querySelectorAll('.tile-card[style!="display: none;"]');
                document.getElementById('searchCount').innerText = `${favorites.length} פריטים`;
                
                if(favorites.length === 0) {
                    document.getElementById('explorerGrid').innerHTML = `
                        <div class="col-span-full py-20 flex flex-col items-center justify-center text-zinc-500">
                            <i data-lucide="heart-crack" class="w-16 h-16 mb-4 opacity-50 stroke-[1]"></i>
                            <p class="text-lg">עדיין לא סימנת אף פריט כמועדף</p>
                        </div>`;
                    lucide.createIcons();
                }
            }
        }

        function showFavorites() {
            clearSearch(false);
            document.getElementById('breadcrumbsContainer').parentElement.classList.add('hidden');
            const searchHeader = document.getElementById('searchResultsHeader');
            searchHeader.classList.remove('hidden');
            
            isSearchMode = true;
            isFavoritesMode = true;
            
            // עדכון כותרות ואייקונים
            document.getElementById('searchHeaderTitle').innerText = "המועדפים שלי";
            document.getElementById('searchHeaderIcon').setAttribute('data-lucide', 'heart');
            document.getElementById('searchHeaderIcon').classList.replace('text-purple-300', 'text-pink-400');
            document.getElementById('favoritesWarning').classList.remove('hidden');
            
            document.getElementById('searchCount').innerText = `${favorites.length} פריטים`;
            
            // סינון רק של הפריטים שקיימים במערך המועדפים (לפי ה-searchIndex הייחודי שיצרנו)
            let favItems = allSearchableItems.filter(item => favorites.includes(item.searchIndex));
            
            lucide.createIcons(); // רענון האייקון בכותרת
            drawGrid(favItems, false);
        }


        // ==========================================
        // מערכת הודעות (גוגל שיטס)
        // ==========================================
        function parseCSV(str) {
            const arr = [];
            let quote = false;
            let row = 0, col = 0, c = 0;
            for (; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        async function fetchAnnouncements() {
            try {
                const response = await fetch(MESSAGES_SHEET_URL);
                if (!response.ok) return;
                const csvText = await response.text();
                const rows = parseCSV(csvText);
                const validRows = rows.filter(row => row.join('').trim().length > 0);
                if (validRows.length === 0) return;
                
                allSystemMessages = validRows; // שמירת כל ההודעות עבור המודל

                // משיכת ההודעה הראשונה (החדשה ביותר) לעמוד הראשי
                const latestMessageText = validRows[0][0] || '';
                const safeHtml = escapeHTML(latestMessageText);
                
                let messagesHTML = `
                    <div class="glass-panel border-r-4 border-purple-500 p-4 md:p-5 rounded-2xl flex items-start gap-4 animate-fade-up">
                        <div class="flex-shrink-0 text-purple-400 bg-purple-500/10 p-2.5 rounded-xl">
                            <i data-lucide="megaphone" class="w-6 h-6"></i>
                        </div>
                        <div class="w-full flex-1 min-w-0 pt-0.5">
                            <div class="text-sm md:text-base text-zinc-200 message-content leading-relaxed">${safeHtml}</div>
                        </div>
                    </div>
                `;

                if (validRows.length > 1) {
                    messagesHTML += `
                        <div class="mt-3 flex justify-end animate-fade-up" style="animation-delay: 0.1s">
                            <button onclick="openMessagesModal()" class="text-sm flex items-center gap-2 text-zinc-400 hover:text-purple-400 transition-colors bg-white/5 hover:bg-white/10 px-4 py-2 rounded-xl border border-white/5 shadow-sm">
                                <i data-lucide="history" class="w-4 h-4"></i>
                                הודעות קודמות
                            </button>
                        </div>
                    `;
                }

                if (messagesHTML.trim() !== '') {
                    const container = document.getElementById('announcements-container');
                    container.innerHTML = messagesHTML;
                    container.classList.remove('hidden');
                    lucide.createIcons({ root: container });
                }
            } catch (error) { console.error('שגיאה בטעינת הודעות:', error); }
        }

        function openMessagesModal() {
            const modalList = document.getElementById('modalMessagesList');
            modalList.innerHTML = allSystemMessages.map((row, index) => {
                const messageText = row[0] || '';
                if (!messageText.trim()) return '';
                const safeHtml = escapeHTML(messageText);
                
                return `
                    <div class="glass-panel border-r-4 ${index === 0 ? 'border-purple-500' : 'border-zinc-600'} p-4 md:p-5 rounded-2xl flex items-start gap-4 mb-4">
                        <div class="flex-shrink-0 ${index === 0 ? 'text-purple-400 bg-purple-500/10' : 'text-zinc-400 bg-zinc-800'} p-2.5 rounded-xl">
                            <i data-lucide="${index === 0 ? 'megaphone' : 'message-square'}" class="w-6 h-6"></i>
                        </div>
                        <div class="w-full flex-1 min-w-0 pt-0.5">
                            <div class="text-sm md:text-base ${index === 0 ? 'text-zinc-200' : 'text-zinc-400'} message-content leading-relaxed">${safeHtml}</div>
                            ${index === 0 ? '<span class="inline-block mt-2 text-xs font-medium bg-purple-500/20 text-purple-300 px-2 py-0.5 rounded">הודעה אחרונה</span>' : ''}
                        </div>
                    </div>
                `;
            }).join('');

            const modal = document.getElementById('messagesModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            lucide.createIcons({ root: modalList });
        }

        function closeMessagesModal() {
            const modal = document.getElementById('messagesModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // ==========================================
        // משיכת נתונים ובניית המערכת
        // ==========================================
        function showSkeletons() {
            const grid = document.getElementById('explorerGrid');
            let skeletonHTML = '';
            for(let i=0; i<15; i++) {
                skeletonHTML += `
                <div class="tile-card rounded-3xl p-5 aspect-square md:aspect-[4/5] flex flex-col items-center justify-center animate-pulse">
                    <div class="w-16 h-16 bg-white/5 rounded-2xl mb-4"></div>
                    <div class="h-3 bg-white/5 rounded w-3/4 mb-3"></div>
                    <div class="h-2 bg-white/5 rounded w-1/2"></div>
                </div>`;
            }
            grid.innerHTML = skeletonHTML;
        }

        async function fetchExplorerData() {
            showSkeletons();
            try {
                const response = await fetch(DATA_JSON_URL + '?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Data file not found');
                const data = await response.json();
                buildFileSystem(data);
            } catch (error) { 
                console.error("שגיאה:", error); 
                document.getElementById('explorerGrid').innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-16 text-center">
                        <i data-lucide="server-crash" class="w-16 h-16 text-red-500/50 mb-4"></i>
                        <p class="text-red-400 text-lg font-medium mb-1">שגיאה בטעינת הנתונים</p>
                        <p class="text-zinc-500 text-sm">הקובץ לא נמצא במאגר. אנא ודא שהסקריפט רץ בהצלחה.</p>
                    </div>`;
                lucide.createIcons({ root: document.getElementById('explorerGrid') });
            }
        }

        function buildFileSystem(jsonData) {
            fileSystem.children = {}; 
            allSearchableItems = [];
            
            jsonData.forEach((item, index) => {
                let pathStr = item["נתיב_תיקיה"] || "";
                let fileName = item["שם_קובץ"] || "";
                const type = item["סוג"] || "";
                const link = item["קישור"] || "";
                const creationDate = item["תאריך_יצירה"] || "";
                
                if(!pathStr || !fileName) return;
                if (pathStr.endsWith('/')) pathStr = pathStr.slice(0, -1);

                const fileObj = { name: fileName, type: type, link: link, path: pathStr, date: creationDate, originalIndex: index };
                
                const folders = pathStr.split('/').filter(f => f.trim() !== "");
                let currentNode = fileSystem;
                let currentPathBuild = [];
                let startIndex = folders[0] === "ראשי" ? 1 : 0;
                if(folders[0] === "ראשי") currentPathBuild.push("ראשי");

                for (let j = startIndex; j < folders.length; j++) {
                    let folderName = folders[j];
                    currentPathBuild.push(folderName);
                    
                    if (!currentNode.children[folderName]) {
                        currentNode.children[folderName] = { name: folderName, type: "folder", pathArr: [...currentPathBuild], children: {} };
                    } 
                    else {
                        if (!currentNode.children[folderName].children) {
                            currentNode.children[folderName].children = {};
                            currentNode.children[folderName].type = "folder";
                        }
                        currentNode.children[folderName].pathArr = [...currentPathBuild];
                    }
                    currentNode = currentNode.children[folderName];
                }
                
                if (currentNode.children[fileName] && currentNode.children[fileName].children) {
                    fileObj.children = currentNode.children[fileName].children;
                }
                currentNode.children[fileName] = fileObj;
            });
            
            function collectAllItems(node, collection) {
                for (const key in node.children) {
                    const child = node.children[key];
                    // יצירת מזהה ייחודי לחיפוש ולמועדפים
                    child.searchIndex = (child.name + " " + (child.path || "")).toLowerCase();
                    collection.push(child);
                    if (child.type === "folder") collectAllItems(child, collection);
                }
            }
            collectAllItems(fileSystem, allSearchableItems);
            renderCurrentFolder();
        }

        function navigateTo(index) {
            clearSearch(false);
            if (index === -1) currentPathArr = []; else currentPathArr = currentPathArr.slice(0, index + 1);
            renderCurrentFolder();
        }

        function jumpToFolderFromSearch(pathString) {
            const pathArray = pathString.split('||');
            if(pathArray[0] === "ראשי") pathArray.shift();
            currentPathArr = pathArray;
            clearSearch(false);
            renderCurrentFolder();
        }

        function renderCurrentFolder() {
            isSearchMode = false;
            let currentNode = fileSystem;
            for (let folder of currentPathArr) { if(currentNode.children[folder]) currentNode = currentNode.children[folder]; }
            
            const breadcrumbsDiv = document.getElementById('breadcrumbsContainer');
            
            let breadcrumbsHTML = `
                <button onclick="navigateTo(-1)" class="flex items-center gap-2 hover:bg-white/10 px-4 py-2 rounded-xl transition duration-300 text-zinc-300 hover:text-white">
                    <i data-lucide="home" class="w-4 h-4"></i>
                    <span>ראשי</span>
                </button>`;
            
            currentPathArr.forEach((folder, index) => {
                breadcrumbsHTML += `
                    <i data-lucide="chevron-left" class="w-4 h-4 text-zinc-600 mx-1 flex-shrink-0"></i>
                    <button onclick="navigateTo(${index})" class="hover:bg-white/10 px-3 py-2 rounded-xl transition duration-300 text-zinc-300 hover:text-white truncate max-w-[120px] md:max-w-[200px]">
                        ${folder}
                    </button>`;
            });
            
            breadcrumbsDiv.innerHTML = breadcrumbsHTML;
            lucide.createIcons({ root: breadcrumbsDiv }); 
            
            drawGrid(Object.values(currentNode.children));
        }

        // ==========================================
        // מנגנון הטעינה העצלה (Lazy Loading)
        // ==========================================
        function drawGrid(items, sortByDate = false) {
            const gridDiv = document.getElementById('explorerGrid');
            gridDiv.innerHTML = '';
            currentlyDisplayedCount = 0;
            
            if (items.length === 0) { 
                gridDiv.innerHTML = `
                    <div class="col-span-full py-20 flex flex-col items-center justify-center text-zinc-500">
                        <i data-lucide="folder-open" class="w-16 h-16 mb-4 opacity-50 stroke-[1]"></i>
                        <p class="text-lg">אין פה כלום...</p>
                    </div>`; 
                lucide.createIcons({ root: gridDiv });
                document.getElementById('loading-sentinel').classList.add('hidden');
                return; 
            }
            
            currentDisplayItems = items.sort((a, b) => {
                if (sortByDate) {
                    let dateA = new Date(a.date).getTime() || 0;
                    let dateB = new Date(b.date).getTime() || 0;
                    if (dateA !== dateB) return dateB - dateA;
                    return (b.originalIndex || 0) - (a.originalIndex || 0);
                }

                if (a.type === "folder" && b.type !== "folder") return -1;
                if (a.type !== "folder" && b.type === "folder") return 1;
                return a.name.localeCompare(b.name);
            });

            renderNextBatch();
            setupIntersectionObserver();
        }

        function renderNextBatch() {
            const gridDiv = document.getElementById('explorerGrid');
            const endIndex = Math.min(currentlyDisplayedCount + BATCH_SIZE, currentDisplayItems.length);
            
            let batchHTML = '';

            for (let i = currentlyDisplayedCount; i < endIndex; i++) {
                const item = currentDisplayItems[i];
                const delay = (i - currentlyDisplayedCount) * 0.03; 
                
                // בדיקה אם הפריט במועדפים
                const safeSearchIndex = item.searchIndex.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                const isFav = favorites.includes(item.searchIndex);
                const favClass = isFav ? 'is-active' : '';
                
                // כפתור מועדפים שיוזרק לכל קלף
                const favButtonHTML = `
                    <button onclick="toggleFavorite(event, '${safeSearchIndex}', this)" class="favorite-btn ${favClass}" title="הוסף למועדפים">
                        <i data-lucide="heart" class="w-4 h-4 text-zinc-300"></i>
                    </button>
                `;

                if (item.type === "folder") {
                    const pathStr = item.pathArr ? item.pathArr.join('||') : item.name;
                    const safePathStr = pathStr.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                    const itemCount = Object.keys(item.children || {}).length;
                    
                    batchHTML += `
                        <div onclick="jumpToFolderFromSearch('${safePathStr}')" class="relative tile-card cursor-pointer rounded-3xl p-5 flex flex-col items-center justify-center text-center aspect-square md:aspect-[4/5] animate-fade-up" style="animation-delay: ${delay}s">
                            ${favButtonHTML}
                            <div class="tile-icon-wrapper w-16 h-16 md:w-20 md:h-20 mb-4 rounded-2xl bg-zinc-800 border border-zinc-700 flex items-center justify-center text-purple-400">
                                <i data-lucide="folder" class="w-8 h-8 md:w-10 md:h-10 fill-purple-900/20 stroke-[1.5]"></i>
                            </div>
                            <span class="font-semibold text-zinc-100 line-clamp-2 text-sm md:text-base leading-snug">${item.name}</span>
                            <span class="text-[10px] md:text-xs text-zinc-500 mt-2 font-mono">${itemCount} פריטים</span>
                            ${(isSearchMode || isFavoritesMode) && item.path ? `
                                <div class="mt-2 text-[10px] text-zinc-500 w-full truncate border-t border-white/5 pt-1">📁 ${item.path}</div>
                            ` : ''}
                        </div>`;
                } else {
                    let iconName = "file-text"; 
                    let themeClass = "text-zinc-400 bg-zinc-800 border-zinc-700";
                    let highlight = "group-hover:text-zinc-200";

                    if(item.type === "וידאו") { 
                        iconName = "clapperboard"; 
                        themeClass = "text-blue-400 bg-blue-500/10 border-blue-500/20"; 
                        highlight = "group-hover:text-blue-300";
                    }
                    if(item.type === "משחק/תוכנה") { 
                        iconName = "gamepad-2"; 
                        themeClass = "text-emerald-400 bg-emerald-500/10 border-emerald-500/20"; 
                        highlight = "group-hover:text-emerald-300";
                    }
                    if(item.type === "שמע") { 
                        iconName = "headphones"; 
                        themeClass = "text-amber-400 bg-amber-500/10 border-amber-500/20"; 
                        highlight = "group-hover:text-amber-300";
                    }
                    
                    batchHTML += `
                        <a href="${item.link}" target="_blank" class="relative tile-card cursor-pointer rounded-3xl p-5 flex flex-col items-center text-center h-full aspect-square md:aspect-[4/5] animate-fade-up group" style="animation-delay: ${delay}s">
                            ${favButtonHTML}
                            <div class="tile-icon-wrapper w-14 h-14 md:w-16 md:h-16 rounded-2xl border flex flex-shrink-0 items-center justify-center mb-4 ${themeClass} transition-colors">
                                <i data-lucide="${iconName}" class="w-7 h-7 md:w-8 md:h-8 stroke-[1.5] ${highlight} transition-colors"></i>
                            </div>
                            <h3 class="font-medium text-zinc-200 text-xs md:text-sm mb-2 line-clamp-3 leading-snug group-hover:text-white transition-colors">${item.name}</h3>
                            ${(isSearchMode || isFavoritesMode) && item.path ? `
                                <div class="mt-auto w-full pt-3 border-t border-white/5">
                                    <div class="text-[10px] text-zinc-500 flex items-start justify-center gap-1 w-full text-center" title="${item.path}">
                                        <i data-lucide="folder" class="w-3 h-3 flex-shrink-0 mt-0.5"></i>
                                        <span class="break-words leading-tight">${item.path}</span>
                                    </div>
                                </div>
                            ` : ''}
                        </a>`;
                }
            }

            gridDiv.insertAdjacentHTML('beforeend', batchHTML);
            lucide.createIcons({ root: gridDiv }); 
            
            currentlyDisplayedCount = endIndex;

            const sentinel = document.getElementById('loading-sentinel');
            if (currentlyDisplayedCount >= currentDisplayItems.length) {
                sentinel.classList.add('hidden');
            } else {
                sentinel.classList.remove('hidden');
            }
        }

        function setupIntersectionObserver() {
            if (intersectionObserver) intersectionObserver.disconnect();
            
            const sentinel = document.getElementById('loading-sentinel');
            intersectionObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && currentlyDisplayedCount < currentDisplayItems.length) {
                    renderNextBatch();
                }
            }, {
                rootMargin: '300px'
            });
            
            intersectionObserver.observe(sentinel);
        }

        function showNewFiles() {
            clearSearch(false);
            document.getElementById('breadcrumbsContainer').parentElement.classList.add('hidden');
            const searchHeader = document.getElementById('searchResultsHeader');
            searchHeader.classList.remove('hidden');
            
            isSearchMode = true;
            isFavoritesMode = false;
            
            document.getElementById('searchHeaderTitle').innerText = "קבצים חדשים";
            document.getElementById('searchHeaderIcon').setAttribute('data-lucide', 'sparkles');
            document.getElementById('searchHeaderIcon').classList.replace('text-pink-400', 'text-purple-300');
            document.getElementById('favoritesWarning').classList.add('hidden');
            
            document.getElementById('searchCount').innerText = "הקבצים החדשים ביותר שעלו למערכת";
            
            let filesOnly = allSearchableItems.filter(item => item.type !== 'folder');
            
            lucide.createIcons();
            drawGrid(filesOnly, true);
        }

        function handleSearch() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const breadcrumbs = document.getElementById('breadcrumbsContainer');
            const searchHeader = document.getElementById('searchResultsHeader');

            if (searchTerm === "") {
                isSearchMode = false;
                isFavoritesMode = false;
                breadcrumbs.parentElement.classList.remove('hidden'); 
                searchHeader.classList.add('hidden');
                renderCurrentFolder(); 
                return;
            }
            
            isSearchMode = true;
            isFavoritesMode = false;
            breadcrumbs.parentElement.classList.add('hidden'); 
            searchHeader.classList.remove('hidden');
            
            document.getElementById('searchHeaderTitle').innerText = "תוצאות חיפוש";
            document.getElementById('searchHeaderIcon').setAttribute('data-lucide', 'file-search');
            document.getElementById('searchHeaderIcon').classList.replace('text-pink-400', 'text-purple-300');
            document.getElementById('favoritesWarning').classList.add('hidden');
            document.getElementById('searchCount').innerText = "מחפש...";

            let results = [];
            for (let i = 0; i < allSearchableItems.length; i++) {
                if (allSearchableItems[i].searchIndex.includes(searchTerm)) {
                    results.push(allSearchableItems[i]);
                }
            }

            document.getElementById('searchCount').innerText = `${results.length} תוצאות`;
            lucide.createIcons();
            drawGrid(results, false);
        }

        let searchTimeout = null;
        document.getElementById('searchInput').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                handleSearch();
            }, 300); 
        });
        
        function clearSearch(render = true) {
            document.getElementById('searchInput').value = "";
            document.getElementById('breadcrumbsContainer').parentElement.classList.remove('hidden');
            document.getElementById('searchResultsHeader').classList.add('hidden');
            isSearchMode = false;
            isFavoritesMode = false;
            if(render) renderCurrentFolder();
        }

    </script>
</body>
